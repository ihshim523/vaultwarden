<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A76E5"/><stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Key icon -->
  <g transform="translate(400,390)">
    <!-- Key head -->
    <circle cx="-35" cy="-60" r="55" stroke="#FFFFFF" stroke-width="18" fill="none"/>
    <!-- Key shaft -->
    <rect x="-8" y="-15" width="16" height="120" rx="4" fill="#FFFFFF"/>
    <!-- Teeth -->
    <rect x="8" y="55" width="22" height="14" rx="4" fill="#FFFFFF"/>
    <rect x="8" y="75" width="16" height="14" rx="4" fill="#FFFFFF"/>
  </g>
</svg>